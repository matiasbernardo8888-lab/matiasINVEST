<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matias Invest | Carteira Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; }
      .font-logo { font-family: 'Orbitron', sans-serif; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
      .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }

</head>
<body class="bg-black text-slate-100 min-h-screen pb-24">
    <div class="max-w-2xl mx-auto">
        <header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-slate-900 p-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="font-logo text-2xl font-black tracking-wider bg-gradient-to-r from-white to-cyan-400 bg-clip-text text-transparent">

                </h1>
                <div class="text-right">
                    <div class="text-xs text-slate-500">Aporte Total</div>
                    <div id="valor-aporte-display" class="text-xl font-black text-cyan-400 font-logo">R$ 0,00</div>

            </div>

            <div class="bg-slate-950 p-3 rounded-xl border border-slate-900 space-y-3">
                <label class="text-xs font-medium text-slate-400">SIMULAR APORTE</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 font-bold text-sm">R$</span>
                    <input type="text" id="input-valor-total" placeholder="0,00" class="w-full bg-slate-900 border border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-white font-bold font-logo focus:outline-none focus:border-cyan-500 transition">
                </div>

                <div class="pt-2 border-t border-slate-800">
                    <label class="text-xs font-medium text-slate-400 mb-2 block">RESERVA DE LIQUIDEZ D+0</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-porquinho" onclick="selecionarLiquidez('porquinho')" class="toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-amber-500/20 text-amber-400 border border-amber-500/40 flex items-center justify-center gap-1.5">
                            <i data-lucide="piggy-bank" class="w-4 h-4"></i> Porquinho Inter
                        </button>
                        <button id="btn-nubank" onclick="selecionarLiquidez('nubank')" class="toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-slate-900 text-slate-500 border border-slate-800 flex items-center justify-center gap-1.5">
                            <i data-lucide="wallet" class="w-4 h-4"></i> Caixinha Nubank
                        </button>
                    </div>
                    <div id="aviso-liquidez" class="text-xs text-amber-400 bg-amber-500/10 p-2 rounded border border-amber-500/20 mt-2 hidden"></div>

            <div class="flex gap-2 mt-3 overflow-x-auto pb-1">

                <button id="filtro-FII" onclick="filtrarCategoria('FII', this)" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    FIIs
                </button>
                <button id="filtro-Acao" onclick="filtrarCategoria('Ação', this)" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Ações
                </button>
                <button id="filtro-ETF" onclick="filtrarCategoria('ETF', this)" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    ETFs
                </button>
                <button id="filtro-Fundo" onclick="filtrarCategoria('Fundo', this)" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Fundos
                </button>
                <button id="filtro-Cripto" onclick="filtrarCategoria('Cripto', this)" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Cripto

        <main id="lista-ativos" class="p-4 space-y-3">
            <p class="text-xs text-slate-500 text-center py-8">Digite um valor acima para gerar sua carteira</p>

        <section class="px-4 pb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-bold text-white flex items-center gap-2">

                </h2>
                <span class="text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20">

            </div>

            </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-md border-t border-slate-900 z-50">
            <div class="max-w-2xl mx-auto grid grid-cols-2 gap-1 p-2">
                <button class="flex flex-col items-center gap-1 py-2 nav-active">
                    <i data-lucide="wallet" class="w-5 h-5"></i>
                    <span class="text-xs font-bold">Carteira</span>
                    <div class="w-8 h-0.5 bg-cyan-500 rounded-full"></div>
                </button>
                <button class="flex flex-col items-center gap-1 py-2 text-slate-600">

                    <span class="text-xs font-medium">Perfil</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        // CORRETORAS REAIS PRA CADA ATIVO - SEM "QUALQUER CORRETORA"
        const carteiraCompleta = [
            { nome: 'CPTS11 - CAPITÂNIA SECURITIES II', subtipo: 'CPTS11', categoria: 'FII', preco: 8.42, aplicacaoMinima: 8.42, nivelMin: 0, peso: 35, ondeEncontrar: 'XP, BTG, Rico, Clear, Inter, NuInvest', precoMaximo: 8.90, dy: 13.26 },
            { nome: 'ITSA4 - ITAÚSA', subtipo: 'ITSA4', categoria: 'Ação', preco: 9.82, aplicacaoMinima: 9.82, nivelMin: 0, peso: 35, ondeEncontrar: 'XP, BTG, Rico, Clear, Inter, NuInvest, Itaú', precoMaximo: 11.00, dy: 7.8 },
            { nome: 'PSEC11 - PÁTRIA SECURITIES', subtipo: 'PSEC11', categoria: 'FII', preco: 9.75, aplicacaoMinima: 9.75, nivelMin: 500, peso: 10, ondeEncontrar: 'XP, BTG, Rico, Clear', precoMaximo: 81.00, dy: 13.23 },
            { nome: 'BBSE3 - BB SEGURIDADE', subtipo: 'BBSE3', categoria: 'Ação', preco: 33.85, aplicacaoMinima: 33.85, nivelMin: 500, peso: 10, ondeEncontrar: 'XP, BTG, Rico, Clear, Inter, BB, Itaú', precoMaximo: 36.00, dy: 8.5 },
            { nome: 'SLCE3 - SLC AGRÍCOLA', subtipo: 'SLCE3', categoria: 'Ação', preco: 18.30, aplicacaoMinima: 18.30, nivelMin: 800, peso: 5, ondeEncontrar: 'XP, BTG, Rico, Clear', precoMaximo: 20.00, dy: 4.2 },
            { nome: 'GOLD11 - GOLD ETF', subtipo: 'Internacional', categoria: 'ETF', preco: 11.95, aplicacaoMinima: 11.95, nivelMin: 500, peso: 5, ondeEncontrar: 'XP, BTG, Rico, Clear, Inter', precoMaximo: null, dy: null },
            { nome: 'CMIG4 - CEMIG', subtipo: 'CMIG4', categoria: 'Ação', preco: 11.45, aplicacaoMinima: 11.45, nivelMin: 1000, peso: 5, ondeEncontrar: 'XP, BTG, Rico, Clear, Inter', precoMaximo: 13.00, dy: 9.1 },
            { nome: 'ACE CAPITAL', subtipo: 'Multimercado', categoria: 'Fundo', aplicacaoMinima: 1, nivelMin: 2000, peso: 5, ondeEncontrar: 'Ágora, Banco Inter, BB, BTG, C6, Genial, Itaú, NuInvest, Pi/Toro, Safra e XP', precoMaximo: null, dy: null },
            { nome: 'VALORA VANGUARD', subtipo: '', categoria: 'Fundo', aplicacaoMinima: 100, nivelMin: 3000, peso: 5, ondeEncontrar: 'BTG, ITAÚ e XP', precoMaximo: null, dy: null },
            { nome: 'BITCOIN', subtipo: 'Teses alternativas', categoria: 'Cripto', aplicacaoMinima: 50, nivelMin: 5000, peso: 5, ondeEncontrar: 'Mercado Bitcoin, Binance, Foxbit, NovaDAX, B3 via ETF HASH11', precoMaximo: null, dy: null }
        ];

        const topCryptos = [
            { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin', color: '#f7931a' },
            { id: 'ethereum', symbol: 'ETH', name: 'Ethereum', color: '#627eea' },
            { id: 'solana', symbol: 'SOL', name: 'Solana', color: '#9945ff' },
            { id: 'binancecoin', symbol: 'BNB', name: 'BNB', color: '#f3ba2f' },
            { id: 'ripple', symbol: 'XRP', name: 'XRP', color: '#23292f' },
            { id: 'dogecoin', symbol: 'DOGE', name: 'Dogecoin', color: '#c2a633' },
            { id: 'cardano', symbol: 'ADA', name: 'Cardano', color: '#0033ad' },
            { id: 'avalanche-2', symbol: 'AVAX', name: 'Avalanche', color: '#e84142' },
            { id: 'chainlink', symbol: 'LINK', name: 'Chainlink', color: '#2a5ada' },
            { id: 'polygon', symbol: 'MATIC', name: 'Polygon', color: '#8247e5' },
            { id: 'polkadot', symbol: 'DOT', name: 'Polkadot', color: '#e6007a' },
            { id: 'tron', symbol: 'TRX', name: 'Tron', color: '#ef0027' },
            { id: 'shiba-inu', symbol: 'SHIB', name: 'Shiba Inu', color: '#ffa409' },
            { id: 'litecoin', symbol: 'LTC', name: 'Litecoin', color: '#345d9d' },
            { id: 'uniswap', symbol: 'UNI', name: 'Uniswap', color: '#ff007a' }
        ];

        let filtroAtual = 'todos';
        let liquidezSelecionada = 'porquinho';
        let carteiraGlobal = []; // ARMAZENA A CARTEIRA CALCULADA PRA NÃO RECALCULAR NO FILTRO

        function formatarMoeda(input) {
            let valor = input.value.replace(/\D/g, '');
            if (valor === '') {
                input.value = '';
                gerarCarteira();
                return;
            }
            valor = (parseInt(valor) / 100).toFixed(2);
            valor = valor.replace('.', ',');
            valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            input.value = valor;
            gerarCarteira();
        }

        function obterValorNumerico() {
            const input = document.getElementById('input-valor-total').value;
            if (!input) return 0;
            return parseFloat(input.replace(/\./g, '').replace(',', '.')) || 0;
        }

        function selecionarLiquidez(tipo) {
            liquidezSelecionada = tipo;
            const btnPorquinho = document.getElementById('btn-porquinho');
            const btnNubank = document.getElementById('btn-nubank');

            if (tipo === 'porquinho') {
                btnPorquinho.className = "toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-amber-500/20 text-amber-400 border border-amber-500/40 flex items-center justify-center gap-1.5";
                btnNubank.className = "toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-slate-900 text-slate-500 border border-slate-800 flex items-center justify-center gap-1.5";
            } else {
                btnNubank.className = "toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-purple-500/20 text-purple-400 border border-purple-500/40 flex items-center justify-center gap-1.5";
                btnPorquinho.className = "toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-slate-900 text-slate-500 border border-slate-800 flex items-center justify-center gap-1.5";
            }
            gerarCarteira();
        }

        function filtrarCategoria(cat, el) {
            filtroAtual = cat;
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-cyan-500/20', 'text-cyan-400', 'border-cyan-500/30');
                btn.classList.add('bg-slate-900', 'text-slate-400', 'border-slate-800');
            });
            el.classList.add('active', 'bg-cyan-500/20', 'text-cyan-400', 'border-cyan-500/30');
            el.classList.remove('bg-slate-900', 'text-slate-400', 'border-slate-800');
            renderizarLista(); // SÓ RENDERIZA, NÃO RECALCULA
        }

        function toggleCard(id) {
            const card = document.getElementById(`expand-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            card.classList.toggle('active');
            icon.style.transform = card.classList.contains('active')? 'rotate(180deg)' : 'rotate(0deg)';
        }

        // LIQUIDEZ DINÂMICA - ESCALONADA
        function calcularLiquidezDinamica(valorTotal) {
            if (valorTotal <= 0) return 0;
            if (valorTotal <= 200) return Math.floor(valorTotal * 0.40); // R$ 100 = R$ 40
            if (valorTotal <= 1000) return Math.floor(valorTotal * 0.30); // R$ 500 = R$ 150
            if (valorTotal <= 5000) return Math.floor(valorTotal * 0.25); // R$ 2000 = R$ 500
            if (valorTotal <= 10000) return 2500; // R$ 10000 = R$ 2500 fixo
            return Math.floor(valorTotal * 0.20); // Acima de 10k = 20%
        }

        function gerarCarteira() {
            const valorTotal = obterValorNumerico();
            const aviso = document.getElementById('aviso-liquidez');

            if (valorTotal <= 0) {
                carteiraGlobal = [];
                document.getElementById('lista-ativos').innerHTML = '<p class="text-xs text-slate-500 text-center py-8">Digite um valor acima para gerar sua carteira</p>';
                document.getElementById('valor-aporte-display').innerText = 'R$ 0,00';
                aviso.classList.add('hidden');
                return;
            }

            document.getElementById('valor-aporte-display').innerText = valorTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            const valorLiquidez = calcularLiquidezDinamica(valorTotal);
            let valorInvestir = valorTotal - valorLiquidez;
            const nomeLiquidez = liquidezSelecionada === 'porquinho'? 'Porquinho Inter' : 'Caixinha Nubank';
            const corLiquidez = liquidezSelecionada === 'porquinho'? 'amber' : 'purple';

            // Define quantos ativos máximo
            let maxAtivos;
            if (valorTotal <= 200) maxAtivos = 2;
            else if (valorTotal < 1000) maxAtivos = 4;
            else if (valorTotal < 5000) maxAtivos = 7;
            else maxAtivos = 12;

            // Filtra só os elegíveis pro valor
            let ativosElegiveis = carteiraCompleta.filter(ativo => {
                if (ativo.nivelMin > valorTotal) return false;
                return ativo.aplicacaoMinima <= valorInvestir;
            }).filter(a => a.peso > 0);

            // Calcula alocação UMA VEZ - isso vira a carteira global
            let carteiraCalculada = [];
            let valorRestante = valorInvestir;
            let ativosParaAlocar = ativosElegiveis.slice(0, maxAtivos);
            let somaPesos = ativosParaAlocar.reduce((acc, a) => acc + (a.peso || 1), 0);

            for (let i = 0; i < ativosParaAlocar.length && valorRestante >= 1; i++) {
                const ativo = ativosParaAlocar[i];
                let valorAlvo = (valorInvestir * (ativo.peso || 1)) / somaPesos;
                if (valorAlvo < ativo.aplicacaoMinima) valorAlvo = ativo.aplicacaoMinima;

                let quantidade = Math.floor(valorAlvo / ativo.aplicacaoMinima);
                let valorAlocado = quantidade * ativo.aplicacaoMinima;

                if (valorAlocado > valorRestante) {
                    quantidade = Math.floor(valorRestante / ativo.aplicacaoMinima);
                    valorAlocado = quantidade * ativo.aplicacaoMinima;
                }

                if (quantidade > 0) {
                    carteiraCalculada.push({
                     ...ativo,
                        quantidade: quantidade,
                        valorAlocado: valorAlocado
                    });
                    valorRestante -= valorAlocado;
                }
            }

            // Redistribui sobras
            if (valorRestante > 0 && carteiraCalculada.length > 0) {
                for (let i = 0; i < carteiraCalculada.length; i++) {
                    let cota = carteiraCalculada[i].aplicacaoMinima;
                    if (valorRestante >= cota) {
                        let qteExtra = Math.floor(valorRestante / cota);
                        carteiraCalculada[i].quantidade += qteExtra;
                        carteiraCalculada[i].valorAlocado += (qteExtra * cota);
                        valorRestante -= (qteExtra * cota);
                    }
                }
            }

            carteiraGlobal = carteiraCalculada; // SALVA A CARTEIRA GLOBAL

            let realInvestido = valorInvestir - valorRestante;
            aviso.innerHTML = `<i data-lucide="${liquidezSelecionada === 'porquinho'? 'piggy-bank' : 'wallet'}" class="w-3 h-3 inline"></i> Reserva: ${valorLiquidez.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })} em ${nomeLiquidez} | Investido: ${realInvestido.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })} | Sobra: ${valorRestante.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}`;
            aviso.className = `text-xs text-${corLiquidez}-400 bg-${corLiquidez}-500/10 p-2 rounded border border-${corLiquidez}-500/20 mt-2`;
            aviso.classList.remove('hidden');

            renderizarLista();
        }

        // RENDERIZA USANDO A CARTEIRA GLOBAL - NÃO RECALCULA
        function renderizarLista() {
            let carteiraVisualizada = carteiraGlobal.filter(ativo => {
                if (filtroAtual!== 'todos' && ativo.categoria!== filtroAtual) return false;
                return true;
            });

            let listaHTML = '';

            if (carteiraVisualizada.length === 0) {
                listaHTML = '<p class="text-xs text-slate-500 text-center py-8 bg-slate-900/40 rounded-lg border border-slate-900">Nenhum ativo alocado para esta categoria com este valor de aporte.</p>';
            } else {
                carteiraVisualizada.forEach((ativo, index) => {
                    const id = `${ativo.nome.replace(/[^a-zA-Z0-9]/g, '')}-${index}`;
                    listaHTML += `
                        <div class="bg-slate-950 rounded-xl border border-slate-900 overflow-hidden">
                            <div class="p-4 cursor-pointer" onclick="toggleCard('${id}')">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="flex-1">
                                        <h3 class="text-sm font-bold text-white mb-0.5">${ativo.nome}</h3>
                                        <p class="text-xs text-slate-500">${ativo.subtipo || ativo.categoria}</p>
                                    </div>
                                    <i id="icon-${id}" data-lucide="chevron-down" class="w-5 h-5 text-cyan-500 transition-transform"></i>
                                </div>
                                <div class="space-y-2">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500">Quantidade</span>
                                        <span class="text-sm font-bold text-white">${ativo.quantidade} ${ativo.categoria === 'Fundo'? 'cota' : 'cotas'}</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500">Valor a ser investido</span>
                                        <span class="text-sm font-bold text-cyan-400">${ativo.valorAlocado.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                    </div>
                                </div>
                            </div>
                            <div id="expand-${id}" class="card-expand border-t border-slate-900">
                                <div class="p-4 space-y-2 bg-black/50">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500">Preço por cota</span>
                                        <span class="text-sm font-semibold text-slate-300">${ativo.aplicacaoMinima.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                    </div>
                                    ${ativo.dy? `<div class="flex justify-between items-center"><span class="text-xs text-slate-500">Dividend Yield 12m</span><span class="text-sm font-semibold text-emerald-400">${ativo.dy.toFixed(2)}%</span></div>` : ''}
                                    ${ativo.precoMaximo? `<div class="flex justify-between items-center"><span class="text-xs text-slate-500">Preço máximo de compra</span><span class="text-sm font-semibold text-slate-300">${ativo.precoMaximo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span></div>` : ''}
                                    <div class="flex justify-between items-start pt-2 border-t border-slate-800">
                                        <span class="text-xs text-slate-500">Onde encontrar</span>
                                        <span class="text-xs font-semibold text-slate-300 text-right max-w-[60%]">${ativo.ondeEncontrar}</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('lista-ativos').innerHTML = listaHTML;
            lucide.createIcons();
        }

        async function buscarPrecosCripto() {
            try {
                const ids = topCryptos.map(c => c.id).join(',');
                const resposta = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
                if (!resposta.ok) throw new Error('API falhou');
                const dados = await resposta.json();

                let cryptoHTML = '';
                topCryptos.forEach(crypto => {
                    const preco = dados[crypto.id]?.usd || 0;
                    const variacao = dados[crypto.id]?.usd_24h_change || 0;
                    const formatado = variacao.toFixed(2) + '%';
                    const classeVariacao = variacao >= 0
                     ? "text-xs font-bold text-emerald-400 flex items-center gap-0.5 bg-emerald-500/10 p-1 px-2 rounded-md border border-emerald-500/20 w-fit"
                        : "text-xs font-bold text-red-400 flex items-center gap-0.5 bg-red-500/10 p-1 px-2 rounded-md border border-red-500/20 w-fit";
                    const icone = variacao >= 0? 'trending-up' : 'trending-down';
                    const sinal = variacao >= 0? '+' : '';

                    cryptoHTML += `
                        <div class="bg-gradient-to-b from-[#060e22] to-[#02050d] p-3 rounded-xl border border-blue-950/60 relative overflow-hidden group hover:border-cyan-500/30 transition-all duration-300">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="text-xs font-bold text-white font-logo tracking-wider">${crypto.name}</h3>
                                    <span class="text-xs text-slate-500 font-mono tracking-widest">${crypto.symbol}</span>
                                </div>
                                <div class="w-6 h-6 rounded-full flex items-center justify-center" style="background-color: ${crypto.color}20; border: 1px solid ${crypto.color}40; color: ${crypto.color}">
                                    <i data-lucide="activity" class="w-3 h-3"></i>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <div class="text-sm font-black font-logo tracking-wide text-white">$${preco.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="${classeVariacao}">
                                    <i data-lucide="${icone}" class="w-3 h-3"></i> ${sinal}${formatado}
                                </div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('crypto-grid').innerHTML = cryptoHTML;
                lucide.createIcons();
            } catch (erro) {
                document.getElementById('crypto-grid').innerHTML = '<p class="text-xs text-amber-400 col-span-full text-center py-4">API bloqueada localmente. Hospede online para ver preços.</p>';
            }
        }

        document.getElementById('input-valor-total').addEventListener('input', function() {
            formatarMoeda(this);
        });

        window.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            buscarPrecosCripto();
            setInterval(buscarPrecosCripto, 30000);
        });
    </script>
</body>
</html>
