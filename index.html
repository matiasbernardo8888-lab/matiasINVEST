<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matias Invest | Carteira Modelo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; }
        .font-logo { font-family: 'Orbitron', sans-serif; }
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
          -webkit-appearance: none; 
          margin: 0; 
        }
        .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .card-expand.active { max-height: 500px; }
        .nav-active { color: #06b6d4; }
        .nav-active svg { stroke: #06b6d4; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen pb-24">
    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-slate-900 p-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="font-logo text-2xl font-black tracking-wider bg-gradient-to-r from-white to-cyan-400 bg-clip-text text-transparent">
                    MATIAS INVEST
                </h1>
                <div class="text-right">
                    <div class="text-xs text-slate-500">Aporte Total</div>
                    <div id="valor-aporte-display" class="text-xl font-black text-cyan-400 font-logo">R$ 30.000,00</div>
                </div>
            </div>
            
            <div class="bg-slate-950 p-3 rounded-xl border border-slate-900 space-y-2">
                <label class="text-xs font-medium text-slate-400">SIMULAR APORTE</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 font-bold text-sm">R$</span>
                    <input type="number" id="input-valor-total" value="30000" placeholder="30000" class="w-full bg-slate-900 border border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-white font-bold font-logo focus:outline-none focus:border-cyan-500 transition" oninput="gerarCarteira()">
                </div>
            </div>

            <!-- FILTROS -->
            <div class="flex gap-2 mt-3 overflow-x-auto pb-1">
                <button onclick="filtrarCategoria('todos')" class="filtro-btn active px-4 py-1.5 rounded-lg text-xs font-bold bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 whitespace-nowrap">
                    Todos
                </button>
                <button onclick="filtrarCategoria('FII')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    FIIs
                </button>
                <button onclick="filtrarCategoria('Ação')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Ações
                </button>
                <button onclick="filtrarCategoria('ETF')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    ETFs
                </button>
                <button onclick="filtrarCategoria('Fundo')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Fundos
                </button>
                <button onclick="filtrarCategoria('Cripto')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Cripto
                </button>
            </div>
        </header>

        <!-- LISTA DE ATIVOS -->
        <main id="lista-ativos" class="p-4 space-y-3">
            <!-- Cards gerados via JS -->
        </main>

        <!-- NAV BOTTOM -->
        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-md border-t border-slate-900 z-50">
            <div class="max-w-2xl mx-auto grid grid-cols-5 gap-1 p-2">
                <button class="flex flex-col items-center gap-1 py-2 text-slate-600">
                    <i data-lucide="zap" class="w-5 h-5"></i>
                    <span class="text-[10px] font-medium">Início</span>
                </button>
                <button class="flex flex-col items-center gap-1 py-2 text-slate-600">
                    <i data-lucide="graduation-cap" class="w-5 h-5"></i>
                    <span class="text-[10px] font-medium">Aprendizado</span>
                </button>
                <button class="flex flex-col items-center gap-1 py-2 nav-active">
                    <i data-lucide="wallet" class="w-5 h-5"></i>
                    <span class="text-[10px] font-bold">Carteira</span>
                    <div class="w-8 h-0.5 bg-cyan-500 rounded-full"></div>
                </button>
                <button class="flex flex-col items-center gap-1 py-2 text-slate-600">
                    <i data-lucide="message-circle" class="w-5 h-5"></i>
                    <span class="text-[10px] font-medium">Comunidade</span>
                </button>
                <button class="flex flex-col items-center gap-1 py-2 text-slate-600">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span class="text-[10px] font-medium">Perfil</span>
                </button>
            </div>
        </nav>
    </div>
    
    <script>
        lucide.createIcons();
        
        // CARTEIRA COMPLETA - DADOS DOS PRINTS + PREÇOS ATUAIS
        const carteiraCompleta = [
            // FUNDOS MULTIMERCADO
            { 
                nome: 'IBIUNA EQUITIES RESP LIMITADA FIF CIC', 
                subtipo: 'AÇÕES', 
                cnpj: '13.401.715/0001-06',
                categoria: 'Fundo', 
                alocacao: 10, 
                aplicacaoMinima: 1000,
                ondeEncontrar: 'C6 Bank, Inter, Genial, Toro e XP',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'ACE CAPITAL', 
                subtipo: 'Multimercado', 
                categoria: 'Fundo', 
                alocacao: 6, 
                aplicacaoMinima: 1,
                ondeEncontrar: 'Ágora, Banco Inter, BB, BTG, C6, Genial, Itaú, NuInvest, Pi / Toro, Safra e XP',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'GENOA CAPITAL RADAR', 
                subtipo: 'Multimercado', 
                categoria: 'Fundo', 
                alocacao: 6, 
                aplicacaoMinima: 500,
                ondeEncontrar: 'Ágora, Banco Inter, BTG, Genial, Guide, Itaú, NuInvest, Pi/Toro, Safra e XP',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'DAHLIA TOTAL RETURN', 
                subtipo: '', 
                categoria: 'Fundo', 
                alocacao: 5, 
                aplicacaoMinima: 500,
                ondeEncontrar: 'Ágora, BTG, C6, Daycoval, Genial, Guide, Inter, NuInvest, Pi/Toro e XP',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'SPX SEAHAWK', 
                subtipo: '', 
                categoria: 'Fundo', 
                alocacao: 5, 
                aplicacaoMinima: 1000,
                ondeEncontrar: 'C6, BTG, Genial, Guide, Inter, Itaú, Pi/Toro, Safra e XP',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'VALORA VANGUARD', 
                subtipo: '', 
                categoria: 'Fundo', 
                alocacao: 5, 
                aplicacaoMinima: 100,
                ondeEncontrar: 'BTG, ITAÚ e XP',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'SOLIS CAPITAL ANTARES PIONEIRO', 
                subtipo: '55.318.040/0001-78', 
                categoria: 'Fundo', 
                alocacao: 5, 
                aplicacaoMinima: 500,
                ondeEncontrar: 'BTG e XP',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'FUNDOS PASSIVOS AO IMA-B', 
                subtipo: '', 
                categoria: 'Fundo', 
                alocacao: 10, 
                aplicacaoMinima: 100,
                ondeEncontrar: 'Home broker',
                precoMaximo: null,
                dy: null
            },

            // ETFs INTERNACIONAIS
            { 
                nome: 'WRLD11 (no exterior é o VT)', 
                subtipo: 'Internacional', 
                categoria: 'ETF', 
                alocacao: 4, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'USDB11 (no exterior é o BND)', 
                subtipo: 'Internacional', 
                categoria: 'ETF', 
                alocacao: 4, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'GOLD11 (no exterior é o IAU)', 
                subtipo: 'Internacional', 
                categoria: 'ETF', 
                alocacao: 3, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: null,
                dy: null
            },

            // FIIs
            { 
                nome: 'KDIF11 (KINEA INFRA RENDA FIXA)', 
                subtipo: 'Renda Fixa Dinâmica', 
                categoria: 'FII', 
                alocacao: 5, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'IFRA11 (ITAÚ FICFIDC DE INFRAESTRUTURA)', 
                subtipo: 'Renda Fixa Dinâmica', 
                categoria: 'FII', 
                alocacao: 5, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: null,
                dy: null
            },
            { 
                nome: 'XPML11 - XP MALLS', 
                subtipo: 'XPML11', 
                categoria: 'FII', 
                alocacao: 5, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: 115.00,
                dy: 10.18
            },
            { 
                nome: 'CPTS11 - CAPITÂNIA SECURITIES II', 
                subtipo: 'CPTS11', 
                categoria: 'FII', 
                alocacao: 4, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: 8.90,
                dy: 13.26
            },
            { 
                nome: 'PVBI11 - VBI PRIME PROPERTIES', 
                subtipo: 'PVBI11', 
                categoria: 'FII', 
                alocacao: 3, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: 110.00,
                dy: 7.11
            },
            { 
                nome: 'PSEC11 - PÁTRIA SECURITIES', 
                subtipo: 'PSEC11', 
                categoria: 'FII', 
                alocacao: 3, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: 81.00,
                dy: 13.23
            },

            // CRIPTO
            { 
                nome: 'BITCOIN', 
                subtipo: 'Teses alternativas', 
                categoria: 'Cripto', 
                alocacao: 3, 
                aplicacaoMinima: null,
                ondeEncontrar: 'Home broker',
                precoMaximo: null,
                dy: null
            }
        ];
        
        let filtroAtual = 'todos';
        
        function filtrarCategoria(cat) {
            filtroAtual = cat;
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-cyan-500/20', 'text-cyan-400', 'border-cyan-500/30');
                btn.classList.add('bg-slate-900', 'text-slate-400', 'border-slate-800');
            });
            event.target.classList.add('active', 'bg-cyan-500/20', 'text-cyan-400', 'border-cyan-500/30');
            event.target.classList.remove('bg-slate-900', 'text-slate-400', 'border-slate-800');
            gerarCarteira();
        }
        
        function toggleCard(id) {
            const card = document.getElementById(`expand-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            card.classList.toggle('active');
            icon.style.transform = card.classList.contains('active') ? 'rotate(180deg)' : 'rotate(0deg)';
        }
        
        function gerarCarteira() {
            const valorTotal = parseFloat(document.getElementById('input-valor-total').value) || 0;
            
            if (valorTotal <= 0) {
                document.getElementById('lista-ativos').innerHTML = '<p class="text-xs text-slate-500 text-center py-8">Digite um valor acima para gerar a carteira</p>';
                document.getElementById('valor-aporte-display').innerText = 'R$ 0,00';
                return;
            }
            
            document.getElementById('valor-aporte-display').innerText = valorTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            let listaHTML = '';
            let carteiraFiltrada = filtroAtual === 'todos' ? carteiraCompleta : carteiraCompleta.filter(a => a.categoria === filtroAtual);
            
            carteiraFiltrada.forEach((ativo, index) => {
                const valorInvestir = valorTotal * (ativo.alocacao / 100);
                const id = `${ativo.nome.replace(/[^a-zA-Z0-9]/g, '')}-${index}`;
                
                listaHTML += `
                    <div class="bg-slate-950 rounded-xl border border-slate-900 overflow-hidden">
                        <div class="p-4 cursor-pointer" onclick="toggleCard('${id}')">
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex-1">
                                    <h3 class="text-sm font-bold text-white mb-0.5">${ativo.nome}</h3>
                                    <p class="text-xs text-slate-500">${ativo.subtipo || ativo.categoria}</p>
                                </div>
                                <i id="icon-${id}" data-lucide="chevron-down" class="w-5 h-5 text-cyan-500 transition-transform"></i>
                            </div>
                            
                            <div class="space-y-2">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs text-slate-500 flex items-center gap-1">
                                        % da Carteira <i data-lucide="info" class="w-3 h-3"></i>
                                    </span>
                                    <span class="text-sm font-bold text-white">${ativo.alocacao.toFixed(2)}%</span>
                                </div>
                                <div class="flex justify-between items-center">
                                    <span class="text-xs text-slate-500 flex items-center gap-1">
                                        Valor a ser investido <i data-lucide="info" class="w-3 h-3"></i>
                                    </span>
                                    <span class="text-sm font-bold text-white">${valorInvestir.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div id="expand-${id}" class="card-expand border-t border-slate-900">
                            <div class="p-4 space-y-2 bg-black/50">
                                ${ativo.aplicacaoMinima ? `
                                <div class="flex justify-between items-center">
                                    <span class="text-xs text-slate-500 flex items-center gap-1">
                                        Aplicação mínima <i data-lucide="info" class="w-3 h-3"></i>
                                    </span>
                                    <span class="text-sm font-semibold text-slate-300">${ativo.aplicacaoMinima.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                </div>` : ''}
                                
                                ${ativo.dy ? `
                                <div class="flex justify-between items-center">
                                    <span class="text-xs text-slate-500 flex items-center gap-1">
                                        Dividend Yield em 12 meses <i data-lucide="info" class="w-3 h-3"></i>
                                    </span>
                                    <span class="text-sm font-semibold text-emerald-400">${ativo.dy.toFixed(2)}%</span>
                                </div>` : ''}
                                
                                ${ativo.precoMaximo ? `
                                <div class="flex justify-between items-center">
                                    <span class="text-xs text-slate-500 flex items-center gap-1">
                                        Preço máximo de compra <i data-lucide="info" class="w-3 h-3"></i>
                                    </span>
                                    <span class="text-sm font-semibold text-slate-300">${ativo.precoMaximo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                </div>` : ''}
                                
                                <div class="flex justify-between items-start pt-2 border-t border-slate-800">
                                    <span class="text-xs text-slate-500 flex items-center gap-1">
                                        Onde encontrar <i data-lucide="info" class="w-3 h-3"></i>
                                    </span>
                                    <span class="text-xs font-semibold text-slate-300 text-right max-w-[60%]">${ativo.ondeEncontrar}</span>
                                </div>
                                
                                <button class="w-full mt-3 py-2 rounded-lg bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 text-xs font-bold hover:bg-cyan-500/20 transition">
                                    Mais detalhes
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('lista-ativos').innerHTML = listaHTML || '<p class="text-xs text-slate-500 text-center py-8">Nenhum ativo nesta categoria</p>';
            lucide.createIcons();
        }
        
        gerarCarteira();
    </script>
</body>
</html>
