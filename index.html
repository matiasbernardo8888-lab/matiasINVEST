<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matias Invest | Carteira Inteligente</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; }
    .font-logo { font-family: 'Orbitron', sans-serif; }
        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
          -webkit-appearance: none;
          margin: 0;
        }
    .card-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .card-expand.active { max-height: 600px; }
    .nav-active { color: #06b6d4; }
    .nav-active svg { stroke: #06b6d4; }
    </style>
</head>
<body class="bg-black text-slate-100 min-h-screen pb-24">
    <div class="max-w-2xl mx-auto">
        <!-- HEADER -->
        <header class="sticky top-0 z-50 bg-black/95 backdrop-blur-md border-b border-slate-900 p-4">
            <div class="flex justify-between items-center mb-4">
                <h1 class="font-logo text-2xl font-black tracking-wider bg-gradient-to-r from-white to-cyan-400 bg-clip-text text-transparent">
                    MATIAS INVEST
                </h1>
                <div class="text-right">
                    <div class="text-xs text-slate-500">Aporte Total</div>
                    <div id="valor-aporte-display" class="text-xl font-black text-cyan-400 font-logo">R$ 0,00</div>
                </div>
            </div>

            <div class="bg-slate-950 p-3 rounded-xl border border-slate-900 space-y-3">
                <label class="text-xs font-medium text-slate-400">SIMULAR APORTE</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 font-bold text-sm">R$</span>
                    <input type="text" id="input-valor-total" placeholder="0,00" class="w-full bg-slate-900 border border-slate-800 rounded-lg pl-10 pr-4 py-2.5 text-white font-bold font-logo focus:outline-none focus:border-cyan-500 transition">
                </div>

                <!-- TOGGLE LIQUIDEZ -->
                <div class="pt-2 border-t border-slate-800">
                    <label class="text-xs font-medium text-slate-400 mb-2 block">RESERVA DE LIQUIDEZ D+0</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button id="btn-porquinho" onclick="selecionarLiquidez('porquinho')" class="toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-amber-500/20 text-amber-400 border border-amber-500/40 flex items-center justify-center gap-1.5">
                            <i data-lucide="piggy-bank" class="w-4 h-4"></i> Porquinho Inter
                        </button>
                        <button id="btn-nubank" onclick="selecionarLiquidez('nubank')" class="toggle-liquid px-3 py-2 rounded-lg text-xs font-bold bg-slate-900 text-slate-500 border border-slate-800 flex items-center justify-center gap-1.5">
                            <i data-lucide="wallet" class="w-4 h-4"></i> Caixinha Nubank
                        </button>
                    </div>
                    <div id="aviso-liquidez" class="text-xs text-amber-400 bg-amber-500/10 p-2 rounded border border-amber-500/20 mt-2 hidden"></div>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="flex gap-2 mt-3 overflow-x-auto pb-1">
                <button onclick="filtrarCategoria('todos')" class="filtro-btn active px-4 py-1.5 rounded-lg text-xs font-bold bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 whitespace-nowrap">
                    Todos
                </button>
                <button onclick="filtrarCategoria('FII')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    FIIs
                </button>
                <button onclick="filtrarCategoria('Ação')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Ações
                </button>
                <button onclick="filtrarCategoria('ETF')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    ETFs
                </button>
                <button onclick="filtrarCategoria('Fundo')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Fundos
                </button>
                <button onclick="filtrarCategoria('Cripto')" class="filtro-btn px-4 py-1.5 rounded-lg text-xs font-bold bg-slate-900 text-slate-400 border border-slate-800 whitespace-nowrap">
                    Cripto
                </button>
            </div>
        </header>

        <!-- LISTA DE ATIVOS -->
        <main id="lista-ativos" class="p-4 space-y-3">
            <p class="text-xs text-slate-500 text-center py-8">Digite um valor acima para gerar sua carteira</p>
        </main>

        <!-- CRIPTO SECTION -->
        <section class="px-4 pb-4">
            <div class="flex items-center justify-between mb-3">
                <h2 class="text-sm font-bold text-white flex items-center gap-2">
                    <i data-lucide="trending-up" class="w-4 h-4 text-amber-500"></i> Top 15 Criptomoedas
                </h2>
                <span class="text-xs text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded border border-emerald-500/20">
                    <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping inline-block mr-1"></span>LIVE
                </span>
            </div>
            <div id="crypto-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-2">
                <p class="text-xs text-slate-500 col-span-full text-center py-4">Carregando...</p>
            </div>
        </section>

        <!-- NAV BOTTOM - SÓ CARTEIRA E PERFIL -->
        <nav class="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-md border-t border-slate-900 z-50">
            <div class="max-w-2xl mx-auto grid grid-cols-2 gap-1 p-2">
                <button class="flex flex-col items-center gap-1 py-2 nav-active">
                    <i data-lucide="wallet" class="w-5 h-5"></i>
                    <span class="text- font-bold">Carteira</span>
                    <div class="w-8 h-0.5 bg-cyan-500 rounded-full"></div>
                </button>
                <button class="flex flex-col items-center gap-1 py-2 text-slate-600">
                    <i data-lucide="user" class="w-5 h-5"></i>
                    <span class="text- font-medium">Perfil</span>
                </button>
            </div>
        </nav>
    </div>

    <script>
        lucide.createIcons();

        // ATIVOS COM PESO DE ALOCAÇÃO - DIVERSIFICAÇÃO INTELIGENTE
        const carteiraCompleta = [
            { nome: 'CPTS11 - CAPITÂNIA SECURITIES II', subtipo: 'CPTS11', categoria: 'FII', preco: 8.42, aplicacaoMinima: 8.42, peso: 25, ondeEncontrar: 'Home broker', precoMaximo: 8.90, dy: 13.26 },
            { nome: 'ITSA4 - ITAÚSA', subtipo: 'ITSA4', categoria: 'Ação', preco: 9.82, aplicacaoMinima: 9.82, peso: 20, ondeEncontrar: 'Home broker', precoMaximo: 11.00, dy: 7.8 },
            { nome: 'PSEC11 - PÁTRIA SECURITIES', subtipo: 'PSEC11', categoria: 'FII', preco: 9.75, aplicacaoMinima: 9.75, peso: 15, ondeEncontrar: 'Home broker', precoMaximo: 81.00, dy: 13.23 },
            { nome: 'BBSE3 - BB SEGURIDADE', subtipo: 'BBSE3', categoria: 'Ação', preco: 33.85, aplicacaoMinima: 33.85, peso: 20, ondeEncontrar: 'Home broker', precoMaximo: 36.00, dy: 8.5 },
            { nome: 'SLCE3 - SLC AGRÍCOLA', subtipo: 'SLCE3', categoria: 'Ação', preco: 18.30, aplicacaoMinima: 18.30, peso: 10, ondeEncontrar: 'Home broker', precoMaximo: 20.00, dy: 4.2 },
            { nome: 'GOLD11 - GOLD ETF', subtipo: 'Internacional', categoria: 'ETF', preco: 11.95, aplicacaoMinima: 11.95, peso: 5, ondeEncontrar: 'Home broker', precoMaximo: null, dy: null },
            { nome: 'CMIG4 - CEMIG', subtipo: 'CMIG4', categoria: 'Ação', preco: 11.45, aplicacaoMinima: 11.45, peso: 5, ondeEncontrar: 'Home broker', precoMaximo: 13.00, dy: 9.1 },
            { nome: 'VALORA VANGUARD', subtipo: '', categoria: 'Fundo', aplicacaoMinima: 100, peso: 0, ondeEncontrar: 'BTG, ITAÚ e XP', precoMaximo: null, dy: null },
            { nome: 'XPML11 - XP MALLS', subtipo: 'XPML11', categoria: 'FII', preco: 97.20, aplicacaoMinima: 97.20, peso: 0, ondeEncontrar: 'Home broker', precoMaximo: 115.00, dy: 10.18 },
            { nome: 'ACE CAPITAL', subtipo: 'Multimercado', categoria: 'Fundo', aplicacaoMinima: 1, peso: 0, ondeEncontrar: 'Ágora, Banco Inter, BB, BTG, C6, Genial, Itaú, NuInvest, Pi / Toro, Safra e XP', precoMaximo: null, dy: null },
            { nome: 'BITCOIN', subtipo: 'Teses alternativas', categoria: 'Cripto', aplicacaoMinima: 50, peso: 0, ondeEncontrar: 'Home broker', precoMaximo: null, dy: null }
        ];

        const topCryptos = [
            { id: 'bitcoin', symbol: 'BTC', name: 'Bitcoin', color: '#f7931a' },
            { id: 'ethereum', symbol: 'ETH', name: 'Ethereum', color: '#627eea' },
            { id: 'solana', symbol: 'SOL', name: 'Solana', color: '#9945ff' },
            { id: 'binancecoin', symbol: 'BNB', name: 'BNB', color: '#f3ba2f' },
            { id: 'ripple', symbol: 'XRP', name: 'XRP', color: '#23292f' },
            { id: 'dogecoin', symbol: 'DOGE', name: 'Dogecoin', color: '#c2a633' },
            { id: 'cardano', symbol: 'ADA', name: 'Cardano', color: '#0033ad' },
            { id: 'avalanche-2', symbol: 'AVAX', name: 'Avalanche', color: '#e84142' },
            { id: 'chainlink', symbol: 'LINK', name: 'Chainlink', color: '#2a5ada' },
            { id: 'polygon', symbol: 'MATIC', name: 'Polygon', color: '#8247e5' },
            { id: 'polkadot', symbol: 'DOT', name: 'Polkadot', color: '#e6007a' },
            { id: 'tron', symbol: 'TRX', name: 'Tron', color: '#ef0027' },
            { id: 'shiba-inu', symbol: 'SHIB', name: 'Shiba Inu', color: '#ffa409' },
            { id: 'litecoin', symbol: 'LTC', name: 'Litecoin', color: '#345d9d' },
            { id: 'uniswap', symbol: 'UNI', name: 'Uniswap', color: '#ff007a' }
        ];

        let filtroAtual = 'todos';
        let liquidezSelecionada = 'porquinho';

        function formatarMoeda(input) {
            let valor = input.value.replace(/\D/g, '');
            if (valor === '') {
                input.value = '';
                gerarCarteira();
                return;
            }
            valor = (parseInt(valor) / 100).toFixed(2);
            valor = valor.replace('.', ',');
            valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
            input.value = valor;
            gerarCarteira();
        }

        function obterValorNumerico() {
            const input = document.getElementById('input-valor-total').value;
            if (!input) return 0;
            return parseFloat(input.replace(/\./g, '').replace(',', '.')) || 0;
        }

        function selecionarLiquidez(tipo) {
            liquidezSelecionada = tipo;
            const btnPorquinho = document.getElementById('btn-porquinho');
            const btnNubank = document.getElementById('btn-nubank');

            if (tipo === 'porquinho') {
                btnPorquinho.classList.add('bg-amber-500/20', 'text-amber-400', 'border-amber-500/40');
                btnPorquinho.classList.remove('bg-slate-900', 'text-slate-500', 'border-slate-800');
                btnNubank.classList.remove('bg-purple-500/20', 'text-purple-400', 'border-purple-500/40');
                btnNubank.classList.add('bg-slate-900', 'text-slate-500', 'border-slate-800');
            } else {
                btnNubank.classList.add('bg-purple-500/20', 'text-purple-400', 'border-purple-500/40');
                btnNubank.classList.remove('bg-slate-900', 'text-slate-500', 'border-slate-800');
                btnPorquinho.classList.remove('bg-amber-500/20', 'text-amber-400', 'border-amber-500/40');
                btnPorquinho.classList.add('bg-slate-900', 'text-slate-500', 'border-slate-800');
            }
            gerarCarteira();
        }

        function filtrarCategoria(cat) {
            filtroAtual = cat;
            document.querySelectorAll('.filtro-btn').forEach(btn => {
                btn.classList.remove('active', 'bg-cyan-500/20', 'text-cyan-400', 'border-cyan-500/30');
                btn.classList.add('bg-slate-900', 'text-slate-400', 'border-slate-800');
            });
            event.target.classList.add('active', 'bg-cyan-500/20', 'text-cyan-400', 'border-cyan-500/30');
            event.target.classList.remove('bg-slate-900', 'text-slate-400', 'border-slate-800');
            gerarCarteira();
        }

        function toggleCard(id) {
            const card = document.getElementById(`expand-${id}`);
            const icon = document.getElementById(`icon-${id}`);
            card.classList.toggle('active');
            icon.style.transform = card.classList.contains('active')? 'rotate(180deg)' : 'rotate(0deg)';
        }

        function gerarCarteira() {
            const valorTotal = obterValorNumerico();
            const aviso = document.getElementById('aviso-liquidez');

            if (valorTotal <= 0) {
                document.getElementById('lista-ativos').innerHTML = '<p class="text-xs text-slate-500 text-center py-8">Digite um valor acima para gerar sua carteira</p>';
                document.getElementById('valor-aporte-display').innerText = 'R$ 0,00';
                aviso.classList.add('hidden');
                return;
            }

            document.getElementById('valor-aporte-display').innerText = valorTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            // REGRA DE LIQUIDEZ: 40%
            const valorLiquidez = Math.floor(valorTotal * 0.40);
            let valorInvestir = valorTotal - valorLiquidez;
            const nomeLiquidez = liquidezSelecionada === 'porquinho'? 'Porquinho Inter' : 'Caixinha Nubank';
            const corLiquidez = liquidezSelecionada === 'porquinho'? 'amber' : 'purple';

            // DEFINE QUANTOS ATIVOS MÁXIMO - SUA REGRA
            let maxAtivos;
            if (valorTotal < 500) maxAtivos = 2;
            else if (valorTotal < 5000) maxAtivos = 3;
            else if (valorTotal < 10000) maxAtivos = 7;
            else maxAtivos = 11;

            // FILTRA ATIVOS COM PESO > 0 E QUE CABEM NO ORÇAMENTO
            let ativosDisponiveis = carteiraCompleta.filter(ativo => {
                if (filtroAtual!== 'todos' && ativo.categoria!== filtroAtual) return false;
                if (ativo.peso === 0) return false;
                return ativo.aplicacaoMinima <= valorInvestir;
            });

            // ALOCAÇÃO POR PESO - NÃO DIVIDE IGUAL
            let carteiraFinal = [];
            let valorRestante = valorInvestir;
            let somaPesos = ativosDisponiveis.reduce((acc, a) => acc + a.peso, 0);

            for (let i = 0; i < ativosDisponiveis.length && carteiraFinal.length < maxAtivos && valorRestante >= 100; i++) {
                const ativo = ativosDisponiveis[i];

                // Calcula valor pra esse ativo baseado no peso
                let valorAlvo = (valorInvestir * ativo.peso) / somaPesos;
                if (valorAlvo < 100) continue; // Mínimo R$ 100 por ativo

                let quantidade = Math.floor(valorAlvo / ativo.aplicacaoMinima);
                if (quantidade === 0) quantidade = 1;

                let valorAlocado = quantidade * ativo.aplicacaoMinima;

                // Se passou do orçamento, ajusta
                if (valorAlocado > valorRestante) {
                    quantidade = Math.floor(valorRestante / ativo.aplicacaoMinima);
                    if (quantidade === 0) continue;
                    valorAlocado = quantidade * ativo.aplicacaoMinima;
                }

                if (valorAlocado < 100 && valorInvestir > 300) continue; // Não mostra migalha

                carteiraFinal.push({
               ...ativo,
                    quantidade: quantidade,
                    valorAlocado: valorAlocado
                });

                valorRestante -= valorAlocado;
            }

            // MOSTRA RESULTADO
            aviso.innerHTML = `<i data-lucide="${liquidezSelecionada === 'porquinho'? 'piggy-bank' : 'wallet'}" class="w-3 h-3 inline"></i> Reserva: ${valorLiquidez.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })} em ${nomeLiquidez} | Investindo: ${(valorInvestir - valorRestante).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })} | Sobra: ${valorRestante.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}`;
            aviso.className = `text-xs text-${corLiquidez}-400 bg-${corLiquidez}-500/10 p-2 rounded border border-${corLiquidez}-500/20 mt-2`;
            aviso.classList.remove('hidden');

            let listaHTML = '';

            if (carteiraFinal.length === 0) {
                listaHTML = '<p class="text-xs text-amber-400 text-center py-8 bg-amber-500/10 rounded-lg border border-amber-500/20">Valor muito baixo. Mínimo recomendado: R$ 200,00</p>';
            } else {
                carteiraFinal.forEach((ativo, index) => {
                    const id = `${ativo.nome.replace(/[^a-zA-Z0-9]/g, '')}-${index}`;

                    listaHTML += `
                        <div class="bg-slate-950 rounded-xl border border-slate-900 overflow-hidden">
                            <div class="p-4 cursor-pointer" onclick="toggleCard('${id}')">
                                <div class="flex justify-between items-start mb-3">
                                    <div class="flex-1">
                                        <h3 class="text-sm font-bold text-white mb-0.5">${ativo.nome}</h3>
                                        <p class="text-xs text-slate-500">${ativo.subtipo || ativo.cnpj || ativo.categoria}</p>
                                    </div>
                                    <i id="icon-${id}" data-lucide="chevron-down" class="w-5 h-5 text-cyan-500 transition-transform"></i>
                                </div>

                                <div class="space-y-2">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500 flex items-center gap-1">
                                            Quantidade <i data-lucide="info" class="w-3 h-3"></i>
                                        </span>
                                        <span class="text-sm font-bold text-white">${ativo.quantidade} ${ativo.categoria === 'Fundo'? 'cota' : 'cotas'}</span>
                                    </div>
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500 flex items-center gap-1">
                                            Valor a ser investido <i data-lucide="info" class="w-3 h-3"></i>
                                        </span>
                                        <span class="text-sm font-bold text-cyan-400">${ativo.valorAlocado.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                    </div>
                                </div>
                            </div>

                            <div id="expand-${id}" class="card-expand border-t border-slate-900">
                                <div class="p-4 space-y-2 bg-black/50">
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500 flex items-center gap-1">
                                            Preço por cota <i data-lucide="info" class="w-3 h-3"></i>
                                        </span>
                                        <span class="text-sm font-semibold text-slate-300">${ativo.aplicacaoMinima.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                    </div>

                                    ${ativo.dy? `
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500 flex items-center gap-1">
                                            Dividend Yield em 12 meses <i data-lucide="info" class="w-3 h-3"></i>
                                        </span>
                                        <span class="text-sm font-semibold text-emerald-400">${ativo.dy.toFixed(2)}%</span>
                                    </div>` : ''}

                                    ${ativo.precoMaximo? `
                                    <div class="flex justify-between items-center">
                                        <span class="text-xs text-slate-500 flex items-center gap-1">
                                            Preço máximo de compra <i data-lucide="info" class="w-3 h-3"></i>
                                        </span>
                                        <span class="text-sm font-semibold text-slate-300">${ativo.precoMaximo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</span>
                                    </div>` : ''}

                                    <div class="flex justify-between items-start pt-2 border-t border-slate-800">
                                        <span class="text-xs text-slate-500 flex items-center gap-1">
                                            Onde encontrar <i data-lucide="info" class="w-3 h-3"></i>
                                        </span>
                                        <span class="text-xs font-semibold text-slate-300 text-right max-w-[60%]">${ativo.ondeEncontrar}</span>
                                    </div>

                                    <button class="w-full mt-3 py-2 rounded-lg bg-cyan-500/10 border border-cyan-500/30 text-cyan-400 text-xs font-bold hover:bg-cyan-500/20 transition">
                                        Mais detalhes
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            document.getElementById('lista-ativos').innerHTML = listaHTML;
            lucide.createIcons();
        }

        async function buscarPrecosCripto() {
            try {
                const ids = topCryptos.map(c => c.id).join(',');
                const resposta = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
                const dados = await resposta.json();

                let cryptoHTML = '';
                topCryptos.forEach(crypto => {
                    const preco = dados[crypto.id]?.usd || 0;
                    const variacao = dados[crypto.id]?.usd_24h_change || 0;
                    const formatado = variacao.toFixed(2) + '%';
                    const classeVariacao = variacao >= 0
                ? "text-xs font-bold text-emerald-400 flex items-center gap-0.5 bg-emerald-500/10 p-1 px-2 rounded-md border border-emerald-500/20 w-fit"
                        : "text-xs font-bold text-red-400 flex items-center gap-0.5 bg-red-500/10 p-1 px-2 rounded-md border border-red-500/20 w-fit";
                    const icone = variacao >= 0? 'trending-up' : 'trending-down';
                    const sinal = variacao >= 0? '+' : '';

                    cryptoHTML += `
                        <div class="bg-gradient-to-b from-[#060e22] to-[#02050d] p-3 rounded-xl border border-blue-950/60 relative overflow-hidden group hover:border-cyan-500/30 transition-all duration-300">
                            <div class="flex justify-between items-start mb-2">
                                <div>
                                    <h3 class="text-xs font-bold text-white font-logo tracking-wider">${crypto.name}</h3>
                                    <span class="text-xs text-slate-500 font-mono tracking-widest">${crypto.symbol}</span>
                                </div>
                                <div class="w-6 h-6 rounded-full flex items-center justify-center" style="background-color: ${crypto.color}20; border: 1px solid ${crypto.color}40; color: ${crypto.color}">
                                    <i data-lucide="activity" class="w-3 h-3"></i>
                                </div>
                            </div>
                            <div class="space-y-1">
                                <div class="text-sm font-black font-logo tracking-wide text-white">$${preco.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                                <div class="${classeVariacao}">
                                    <i data-lucide="${icone}" class="w-3 h-3"></i> ${sinal}${formatado}
                                </div>
                            </div>
                        </div>
                    `;
                });

                document.getElementById('crypto-grid').innerHTML = cryptoHTML;
                lucide.createIcons();
            } catch (erro) {
                console.error("Erro na leitura de dados do mercado: ", erro);
                document.getElementById('crypto-grid').innerHTML = '<p class="text-xs text-red-400 col-span-full text-center py-4">Erro ao carregar criptomoedas</p>';
            }
        }

        // Event listeners
        document.getElementById('input-valor-total').addEventListener('input', function() {
            formatarMoeda(this);
        });

        // Inicializa
        window.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            buscarPrecosCripto();
            setInterval(buscarPrecosCripto, 30000);
        });
    </script>
</body>
</html>
